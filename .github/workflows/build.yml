name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Build archive
        run: |
          xcodebuild clean archive \
            -project BrowserApp.xcodeproj \
            -scheme BrowserApp \
            -configuration Release \
            -archivePath $PWD/build/BrowserApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create IPA from archive
        run: |
          mkdir -p build/output
          APP_PATH=$(find build/BrowserApp.xcarchive -name "BrowserApp.app" -type d | head -1)
          mkdir -p build/output/Payload
          cp -R "$APP_PATH" build/output/Payload/
          cd build/output
          zip -r ../BrowserApp.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrowserApp-IPA
          path: build/BrowserApp.ipa
          retention-days: 30
